<head>

  <title>Churrascaria e Pizzaria Do 30</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Montserrat', sans-serif; background: #0c0a09; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes glow { 0%, 100% { text-shadow: 0 0 20px rgba(201,162,39,0.3); } 50% { text-shadow: 0 0 50px rgba(201,162,39,0.8); } }
    .fade-up { animation: fadeUp 0.8s ease forwards; opacity: 0; }
    .d1 { animation-delay: 0.1s; } .d2 { animation-delay: 0.25s; } .d3 { animation-delay: 0.4s; }
    .d4 { animation-delay: 0.55s; } .d5 { animation-delay: 0.7s; } .d6 { animation-delay: 0.85s; }
    .d7 { animation-delay: 1.0s; } .d8 { animation-delay: 1.15s; }
    .glow { animation: glow 3s ease-in-out infinite; }
    .fire-line { background: linear-gradient(90deg, transparent, #C9A227, #8B0000, #C9A227, transparent); height: 2px; border-radius: 2px; }
    .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 16px; border-radius: 14px; font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 15px; text-decoration: none; letter-spacing: 0.5px; transition: transform 0.25s ease, opacity 0.25s ease; cursor: pointer; }
    .btn:hover { transform: scale(1.04); opacity: 0.92; }
    .pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 999px; border: 1px solid #292524; background: rgba(28,25,23,0.75); }
    .pill span { font-size: 13px; font-weight: 700; color: #d6d3d1; }
  </style>
</head>
